<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全栈任务管理器 - 私密版</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-indigo-100 to-purple-100 min-h-screen font-sans text-gray-800">

    <div id="auth-container" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md transition-all">
            <h1 class="text-3xl font-bold text-center text-indigo-600 mb-6">🔐 欢迎回来</h1>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                    <input type="text" id="username" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="输入你的专属账号">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                    <input type="password" id="password" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="输入密码 (绝不泄露)">
                </div>

                <div class="flex gap-4 pt-4">
                    <button onclick="login()" class="flex-1 bg-indigo-600 text-white py-2 rounded-lg font-bold hover:bg-indigo-700 transition">登录</button>
                    <button onclick="register()" class="flex-1 bg-purple-100 text-purple-700 py-2 rounded-lg font-bold hover:bg-purple-200 transition">注册新号</button>
                </div>
                <p id="auth-message" class="text-center text-sm text-red-500 mt-2 font-bold"></p>
            </div>
        </div>
    </div>

    <div id="app-container" class="hidden max-w-2xl mx-auto pt-12 px-4 pb-12">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600">
                🚀 我的私密清单
            </h1>
            <button onclick="logout()" class="text-sm bg-red-100 text-red-600 px-4 py-2 rounded-lg font-bold hover:bg-red-200">退出登录</button>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-lg mb-8 flex flex-col md:flex-row gap-4">
            <input type="text" id="task-title" placeholder="✍️ 准备做点什么？" class="flex-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-400 outline-none">

            <input type="date" id="task-deadline" class="px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl outline-none text-gray-600">

            <select id="task-category" class="px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl outline-none">
                <option value="💻 工作">💻 工作</option>
                <option value="🏠 生活" selected>🏠 生活</option>
                <option value="📚 学习">📚 学习</option>
            </select>

            <button onclick="addTask()" class="bg-gradient-to-r from-indigo-500 to-purple-500 text-white px-6 py-3 rounded-xl font-bold hover:shadow-lg transform hover:-translate-y-1 transition duration-200">
                添加
            </button>
        </div>

        <ul id="task-list" class="space-y-4">
            </ul>
    </div>

    <script>
        // 🌟 核心：换成你自己的后端真实网址！(千万别加 /tasks，只保留到 .com)
        const API_URL = "https://my-frontend-page.onrender.com";

        // --- 🔐 认证系统逻辑 ---

        // 获取用户的“数字手环”
        function getToken() {
            return localStorage.getItem('access_token');
        }

        // 统一配置“带手环的请求头”
        function getAuthHeaders() {
            return {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${getToken()}` // 出示手环！
            };
        }

        // 页面刚加载时，检查是否已经登录过
        window.onload = function() {
            if (getToken()) {
                showApp();
            } else {
                showLogin();
            }
        };

        function showLogin() {
            document.getElementById('auth-container').classList.remove('hidden');
            document.getElementById('app-container').classList.add('hidden');
        }

        function showApp() {
            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
            fetchTasks(); // 切换到主界面后，立刻拉取数据
        }

        // 退出登录：撕毁手环
        function logout() {
            localStorage.removeItem('access_token');
            showLogin();
        }

        // 注册功能
        async function register() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const msgBox = document.getElementById('auth-message');

            if (!u || !p) return msgBox.innerText = "账号密码不能为空！";

            const res = await fetch(`${API_URL}/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, password: p })
            });

            if (res.ok) {
                msgBox.style.color = "green";
                msgBox.innerText = "注册成功！请点击登录。";
            } else {
                const data = await res.json();
                msgBox.style.color = "red";
                msgBox.innerText = data.detail || "注册失败";
            }
        }

        // 登录功能
        async function login() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const msgBox = document.getElementById('auth-message');

            const res = await fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, password: p })
            });

            if (res.ok) {
                const data = await res.json();
                // 核心动作：把后端发的 JWT 存进浏览器的保险箱 localStorage
                localStorage.setItem('access_token', data.access_token);
                showApp();
            } else {
                msgBox.style.color = "red";
                msgBox.innerText = "账号或密码错误！";
            }
        }

        // --- 📝 业务系统逻辑 (每次请求必须带手环) ---

        async function fetchTasks() {
            const res = await fetch(`${API_URL}/tasks`, {
                headers: getAuthHeaders() // 给保安看手环
            });
            if (res.status === 401) return logout(); // 手环过期，踢回登录页

            const tasks = await res.json();
            const listElement = document.getElementById('task-list');
            listElement.innerHTML = ''; // 清空旧列表

            tasks.forEach(task => {
                const li = document.createElement('li');
                li.className = `flex justify-between items-center bg-white p-5 rounded-2xl shadow-sm border-l-4 ${task.is_completed ? 'border-green-400 opacity-60' : 'border-indigo-500'} transition`;

                li.innerHTML = `
                    <div class="flex items-center gap-4">
                        <input type="checkbox" ${task.is_completed ? 'checked' : ''} onchange="toggleTask(${task.id})" class="w-6 h-6 text-indigo-600 rounded cursor-pointer">
                        <div>
                            <p class="text-lg font-bold ${task.is_completed ? 'line-through text-gray-400' : 'text-gray-800'}">${task.title}</p>
                            <div class="flex gap-2 text-xs font-semibold mt-1">
                                <span class="bg-indigo-50 text-indigo-600 px-2 py-1 rounded">${task.category}</span>
                                <span class="bg-gray-100 text-gray-500 px-2 py-1 rounded">截止: ${task.deadline}</span>
                            </div>
                        </div>
                    </div>
                    <button onclick="deleteTask(${task.id})" class="text-red-400 hover:text-red-600 hover:bg-red-50 p-2 rounded-lg transition">删除</button>
                `;
                listElement.appendChild(li);
            });
        }

        async function addTask() {
            const title = document.getElementById('task-title').value;
            const deadline = document.getElementById('task-deadline').value;
            const category = document.getElementById('task-category').value;

            if (!title) return alert("写点什么吧！");

            await fetch(`${API_URL}/tasks`, {
                method: 'POST',
                headers: getAuthHeaders(), // 给保安看手环
                body: JSON.stringify({ title, deadline: deadline || "无期限", category })
            });

            document.getElementById('task-title').value = '';
            document.getElementById('task-deadline').value = '';
            fetchTasks();
        }

        async function toggleTask(id) {
            await fetch(`${API_URL}/tasks/${id}`, {
                method: 'PUT',
                headers: getAuthHeaders() // 给保安看手环
            });
            fetchTasks();
        }

        async function deleteTask(id) {
            await fetch(`${API_URL}/tasks/${id}`, {
                method: 'DELETE',
                headers: getAuthHeaders() // 给保安看手环
            });
            fetchTasks();
        }
    </script>
</body>
</html>
